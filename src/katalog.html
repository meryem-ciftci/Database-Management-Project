<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Yönetimi</title>
    <style>
        body {
            background-color: #E8D8B6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Form ve Tabloları Toplayan Ana Panel Kartı */
        .container {
                max-width: 1000px;
                margin: 40px auto;
                background-color: #ffffff;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        /* Başlık Stili */
        h2 {
            color: #4a3b2c;
            border-bottom: 2px solid #F1B77B;
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* Sekme (Tab) Menüsü Tasarımı */
        .nav-tabs {
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .nav-tabs .nav-link {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        /* Aktif Sekme Çizgisi - Main'in buton rengiyle uyumlu */
        .nav-tabs .nav-link.active {
            color: #333;
            font-weight: bold;
            border-bottom: 3px solid #F1B77B;
        }

/* Girdi Kutuları (Inputs) */
.form-group {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input[type="text"], select {
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    width: 220px;
    font-size: 14px;
    transition: border-color 0.3s;
}

input[type="text"]:focus, select:focus {
    border-color: #F1B77B;
    outline: none;
}

/* Standart Butonlar - Main'deki pastel turuncu/kahve tonu */
button {
    background-color: #F1B77B;
    color: #333;
    border: 1px solid #dca061;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    background-color: #dca061;
    transform: translateY(-1px);
}

/* Silme Butonları - Tasarımı bozmayan pastel kiremit rengi */
button[onclick*="Sil"], .btn-danger {
    background-color: #D96A6A;
    color: white;
    border: 1px solid #b85454;
}

button[onclick*="Sil"]:hover, .btn-danger:hover {
    background-color: #c05858;
}

/* Tablo Tasarımı */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background-color: #fff;
}

th, td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #e0e0e0;
}

th {
    background-color: #f9f6f0;
    color: #4a3b2c;
    font-weight: bold;
}

tr:hover {
    background-color: #fcfbfa;
}
        /* SEKME İÇERİKLERİNİ GİZLEME VE GÖSTERME (Sorunu çözen kısım) */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
    animation: fadeIn 0.3s ease-in-out; /* Sayfa değişirken yumuşak bir geçiş yapsın */
}

/* Yumuşak geçiş animasyonu */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('yazar-section')">Yazar Yönetimi</button>
        <button class="tab-btn" onclick="switchTab('kitap-section')">Kitap Yönetimi</button>
        <button class="tab-btn" onclick="switchTab('kopya-section')">Kopya (Envanter) Yönetimi</button>
    </div>

    <div id="yazar-section" class="tab-content active">
        <h3>Yeni Yazar Ekle</h3>
        <div class="form-group">
            <input type="text" id="fname" placeholder="Yazarın Adı" required>
            <input type="text" id="lname" placeholder="Yazarın Soyadı" required>
            <button onclick="yazarEkle()">Yazar Ekle</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Yazar ID</th>
                    <th>Ad</th>
                    <th>Soyad</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="yazarTablosu"></tbody>
        </table>
    </div>

    <div id="kitap-section" class="tab-content">
        <h3>Yeni Kitap Ekle</h3>
        <div class="form-group">
            <input type="text" id="bookIsbn" placeholder="ISBN (Örn: 978...)" required>
            <input type="text" id="bookTitle" placeholder="Kitap Adı" required>
            <input type="text" id="bookCategory" placeholder="Kategori" required>
            
            <div>
                <select id="bookAuthors" multiple required>
                    </select>
                <span class="small-text">* Birden fazla seçmek için Ctrl'ye basılı tutun.</span>
            </div>
            
            <button onclick="kitapEkle()">Kitap Ekle</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ISBN</th>
                    <th>Kitap Adı</th>
                    <th>Kategori</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="kitapTablosu"></tbody>
        </table>
    </div>

    <div id="kopya-section" class="tab-content">
        <h3>Yeni Fiziksel Kopya Ekle</h3>
        <div class="form-group">
            <input type="text" id="accessionNumber" placeholder="Demirbaş No (Accession Num)" required>
            <select id="copyIsbn" required>
                <option value="">-- Ait Olduğu Kitabı Seçin --</option>
                </select>
            <input type="number" id="yearOfPub" placeholder="Basım Yılı" required>
            <input type="text" id="publisher" placeholder="Yayınevi" required>
            <input type="number" id="numberOfPages" placeholder="Sayfa Sayısı" required>
            <button onclick="kopyaEkle()">Kopya Ekle</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Demirbaş No</th>
                    <th>ISBN</th>
                    <th>Basım Yılı</th>
                    <th>Yayınevi</th>
                    <th>Sayfa</th>
                </tr>
            </thead>
            <tbody id="kopyaTablosu"></tbody>
        </table>
    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:3000/api';

    // Sayfa yüklendiğinde tüm verileri çek
    document.addEventListener('DOMContentLoaded', () => {
        yazarlariGetir();
        kitaplariGetir();
        kopyalariGetir();
    });

    // Sekme Değiştirme Fonksiyonu
    function switchTab(sectionId) {
        document.querySelectorAll('.tab-content').forEach(el => {
            el.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(el => {
            el.classList.remove('active');
        });
        
        document.getElementById(sectionId).classList.add('active');
        event.target.classList.add('active');
    }

    // ==========================================
    // YAZAR API İŞLEMLERİ
    // ==========================================
    async function yazarlariGetir() {
        try {
            const response = await fetch(`${BASE_URL}/authors`);
            const yazarlar = await response.json();
            
            const tablo = document.getElementById('yazarTablosu');
            const selectDropdown = document.getElementById('bookAuthors');
            
            tablo.innerHTML = '';
            selectDropdown.innerHTML = ''; 

            yazarlar.forEach(yazar => {
                tablo.innerHTML += `
                    <tr>
                        <td>${yazar.AuthorID}</td>
                        <td>${yazar.FName}</td>
                        <td>${yazar.LName}</td>
                        <td>
                            <button class="btn-danger" onclick="yazarSil(${yazar.AuthorID})">Sil</button>
                        </td>
                    </tr>
                `;
                selectDropdown.innerHTML += `<option value="${yazar.AuthorID}">${yazar.FName} ${yazar.LName}</option>`;
            });
        } catch (error) {
            console.error('Yazarlar yüklenirken hata:', error);
        }
    }

    async function yazarEkle() {
        const fname = document.getElementById('fname').value;
        const lname = document.getElementById('lname').value;

        if (!fname || !lname) {
            return alert('Lütfen yazarın adını ve soyadını girin!');
        }

        try {
            const response = await fetch(`${BASE_URL}/authors`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fName: fname, lName: lname })
            });

            if (response.ok) {
                document.getElementById('fname').value = '';
                document.getElementById('lname').value = '';
                yazarlariGetir();
            }
        } catch (error) {
            console.error('Yazar ekleme hatası:', error);
        }
    }

    async function yazarSil(id) {
        if(confirm('Bu yazarı silmek istediğinize emin misiniz?')) {
            try {
                const response = await fetch(`${BASE_URL}/authors/${id}`, { method: 'DELETE' });
                if(response.ok) {
                    yazarlariGetir();
                } else {
                    alert('Yazar silinemedi. Bu yazara ait bir kitap tanımlı olabilir!');
                }
            } catch (error) {
                console.error('Yazar silme hatası:', error);
            }
        }
    }

    // ==========================================
    // KİTAP API İŞLEMLERİ
    // ==========================================
    async function kitaplariGetir() {
        try {
            const response = await fetch(`${BASE_URL}/books`);
            const kitaplar = await response.json();
            
            const tablo = document.getElementById('kitapTablosu');
            const copySelect = document.getElementById('copyIsbn'); 
            
            tablo.innerHTML = '';
            copySelect.innerHTML = '<option value="">-- Ait Olduğu Kitabı Seçin --</option>';

            kitaplar.forEach(kitap => {
                tablo.innerHTML += `
                    <tr>
                        <td>${kitap.ISBN}</td>
                        <td>${kitap.Title}</td>
                        <td>${kitap.Category}</td>
                        <td>
                            <button class="btn-danger" onclick="kitapSil('${kitap.ISBN}')">Sil</button>
                        </td>
                    </tr>
                `;
                copySelect.innerHTML += `<option value="${kitap.ISBN}">${kitap.Title} (${kitap.ISBN})</option>`;
            });
        } catch (error) {
            console.error('Kitaplar yüklenirken hata:', error);
        }
    }

    async function kitapEkle() {
        const isbn = document.getElementById('bookIsbn').value;
        const title = document.getElementById('bookTitle').value;
        const category = document.getElementById('bookCategory').value;
        const selectedAuthors = Array.from(document.getElementById('bookAuthors').selectedOptions).map(option => option.value);

        if (!isbn || !title || !category || selectedAuthors.length === 0) {
            return alert('Lütfen kitap bilgilerini doldurun ve en az bir yazar seçin!');
        }

        try {
            const bookResponse = await fetch(`${BASE_URL}/books`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isbn, title, category })
            });

            if (bookResponse.ok) {
                for (const authorId of selectedAuthors) {
                    await fetch(`${BASE_URL}/books/${isbn}/authors`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ authorId: parseInt(authorId) })
                    });
                }

                alert('Kitap ve yazar eşleşmeleri başarıyla kaydedildi!');
                
                document.getElementById('bookIsbn').value = '';
                document.getElementById('bookTitle').value = '';
                document.getElementById('bookCategory').value = '';
                document.getElementById('bookAuthors').selectedIndex = -1;
                
                kitaplariGetir(); 
            } else {
                alert('Kitap eklenirken bir hata oluştu (ISBN benzersiz olmalıdır).');
            }
        } catch (error) {
            console.error('Kitap ekleme hatası:', error);
        }
    }

    async function kitapSil(isbn) {
        if(confirm('Bu kitabı silmek istediğinize emin misiniz?')) {
            try {
                const response = await fetch(`${BASE_URL}/books/${isbn}`, { method: 'DELETE' });
                if(response.ok) {
                    kitaplariGetir();
                }
            } catch (error) {
                console.error('Kitap silme hatası:', error);
            }
        }
    }

    // ==========================================
    // KOPYA API İŞLEMLERİ
    // ==========================================
    async function kopyalariGetir() {
        try {
            const response = await fetch(`${BASE_URL}/copies`);
            const kopyalar = await response.json();
            
            const tablo = document.getElementById('kopyaTablosu');
            tablo.innerHTML = '';
            
            kopyalar.forEach(kopya => {
                tablo.innerHTML += `
                    <tr>
                        <td>${kopya.AccessionNumber}</td>
                        <td>${kopya.ISBN}</td>
                        <td>${kopya.YearOfPublication}</td>
                        <td>${kopya.Publisher}</td>
                        <td>${kopya.NumberOfPages}</td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error('Kopyalar yüklenirken hata:', error);
        }
    }

    async function kopyaEkle() {
        const accessionNumber = document.getElementById('accessionNumber').value;
        const isbn = document.getElementById('copyIsbn').value;
        const year = document.getElementById('yearOfPub').value;
        const publisher = document.getElementById('publisher').value;
        const pages = document.getElementById('numberOfPages').value;

        if (!accessionNumber || !isbn || !year || !publisher || !pages) {
            return alert('Lütfen tüm alanları doldurun!');
        }

        try {
            const response = await fetch(`${BASE_URL}/copies`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accessionNumber, isbn, year, publisher, pages })
            });

            if (response.ok) {
                alert('Kopya başarıyla eklendi!');
                
                document.getElementById('accessionNumber').value = '';
                document.getElementById('copyIsbn').value = '';
                document.getElementById('yearOfPub').value = '';
                document.getElementById('publisher').value = '';
                document.getElementById('numberOfPages').value = '';
                
                kopyalariGetir();
            } else {
                alert('Kopya eklenirken hata oluştu (Demirbaş numarası benzersiz olmalı).');
            }
        } catch (error) {
            console.error('Kopya ekleme hatası:', error);
        }
    }
</script>

</body>
</html>
