<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership page</title>
    <style>
        body{
            background-color:rgb(219, 198, 146);
            background-image: url("./books.png");
            background-size: cover;
            background-attachment: fixed;
        }

        /* Form ve Tabloları Toplayan Ana Panel Kartı */
        .container {
                max-width: 1000px;
                margin: 40px auto;
                background-color: #ffffff;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        /* Başlık Stili */
        h2 {
            color: #4a3b2c;
            border-bottom: 2px solid #F1B77B;
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* Sekme (Tab) Menüsü Tasarımı */
        .nav-tabs {
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .nav-tabs .nav-link {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        /* Aktif Sekme Çizgisi - Main'in buton rengiyle uyumlu */
        .nav-tabs .nav-link.active {
            color: #333;
            font-weight: bold;
            border-bottom: 3px solid #F1B77B;
        }

/* Girdi Kutuları (Inputs) */
.form-group {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input[type="text"], select {
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    width: 220px;
    font-size: 14px;
    transition: border-color 0.3s;
}


/* Standart Butonlar - Main'deki pastel turuncu/kahve tonu */
button {
    background-color: #F1B77B;
    color: #333;
    border: 1px solid #dca061;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    background-color: #dca061;
    transform: translateY(-1px);
}


/* Tablo Tasarımı */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background-color: #fff;
}

th, td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #e0e0e0;
}

/* Yumuşak geçiş animasyonu */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
    </style>
</head>
<body>
    <div class="container">
        <h2>New Member</h2>
        <form id="form">
            <input type="text" id="fname" placeholder=" First Name" required>
            <input type="text" id="lname" placeholder="Last Name" required>
            <input type="text" id="email" placeholder="email" required>
            <input type="text" id="phone" placeholder="Phone Number" required>
            <input type="text" id="region" placeholder="Region" required>
            <input type="text" id="postalCode" placeholder="Postal Code" required>
            <button type="submit">Save</button>
        </form>
        <hr>
        <h2>Saved Members</h2>
        <table id="table">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone Number</th>
                    <th>Region</th>
                    <th>Postal Code</th>
                    <th>Read Books</th>
                    <th>Borrowed Books</th>
                    <th>Operations</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="error" style="color: red;"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
